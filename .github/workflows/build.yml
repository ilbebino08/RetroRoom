name: Build JavaFX fat jars

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            profile: windows
            jarSuffix: win
          - os: ubuntu-latest
            profile: linux
            jarSuffix: linux
          - os: macos-latest
            profile: mac
            jarSuffix: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          cache: maven

      - name: Build fat jar
        run: mvn -P${{ matrix.profile }} -DskipTests clean package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroroom-${{ matrix.jarSuffix }}
          path: target/*.jar