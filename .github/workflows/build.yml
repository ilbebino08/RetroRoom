name: Build JavaFX JAR

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build with Maven
        run: mvn clean package
        env:
          JAVAFX_PLATFORM: ${{ matrix.platform }}

      - name: Rename JAR
        run: |
          mkdir output
          cp target/*shaded.jar output/retroroom-${{ matrix.platform }}.jar
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroroom-${{ matrix.platform }}
          path: output/*.jar